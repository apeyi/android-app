workflows:
  ios-build:
    name: iOS Build & Test
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: cd FBAudio-iOS && xcodegen generate

      - name: Build
        script: |
          set -o pipefail
          cd FBAudio-iOS
          xcodebuild build \
            -project FBAudio.xcodeproj \
            -scheme FBAudio \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee ../build.log

      - name: Test
        script: |
          set -o pipefail
          cd FBAudio-iOS
          xcodebuild test \
            -project FBAudio.xcodeproj \
            -scheme FBAudio \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee ../test.log

    artifacts:
      - build.log
      - test.log
